    <meta http-equiv="Pragma" content="no-cache" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CclipPath id='c'%3E%3Ccircle cx='50' cy='50' r='50'/%3E%3C/clipPath%3E%3C/defs%3E%3Cimage href='https://i.postimg.cc/nhq0jWD8/logo.png' width='100' height='100' clip-path='url(%23c)'/%3E%3C/svg%3E" />
    <link rel="icon" type="image/png" href="https://i.postimg.cc/nhq0jWD8/logo.png?v=2" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/nhq0jWD8/logo.png?v=2" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Մեծածախ" />
    <title>ՄԵԾԱԾԱԽ ՎԱՃԱՌՔ</title>
    <script>
      (function() {
        var manifest = {
          name: "Մեծածախ Վաճառք",
          short_name: "Մեծածախ",
          description: "Մեծածախ վաճառքի կայք",
          start_url: "/",
          display: "standalone",
          background_color: "#000000",
          theme_color: "#000000",
          orientation: "portrait",
          icons: [
            { src: "https://i.postimg.cc/nhq0jWD8/logo.png?v=2", sizes: "192x192", type: "image/png", purpose: "any maskable" },
            { src: "https://i.postimg.cc/nhq0jWD8/logo.png?v=2", sizes: "512x512", type: "image/png", purpose: "any maskable" }
          ]
        };
        var blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("link");
        link.rel = "manifest";
        link.href = url;
        document.head.appendChild(link);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
